
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StairStep Elite | Global Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
            --gold: #fbbf24;
            --silver: #cbd5e1;
            --bronze: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Background Effects */
        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #020617; overflow: hidden; }
        .liquid-container { position: absolute; width: 100%; height: 100%; filter: blur(100px); }
        .liquid-blob { position: absolute; width: 50vw; height: 50vw; border-radius: 50%; opacity: 0.2; }
        .blob-1 { background: var(--primary); top: -10%; left: -10%; animation: float 20s infinite alternate; }
        .blob-2 { background: var(--secondary); bottom: -10%; right: -10%; animation: float 25s infinite alternate-reverse; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 10%) scale(1.2); } }

        .container { width: 100%; max-width: 600px; padding: 60px 24px; position: relative; z-index: 10; }

        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3em; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 16px; text-align: left; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        td { padding: 16px; background: rgba(255, 255, 255, 0.02); }
        td:first-child { border-radius: 16px 0 0 16px; }
        td:last-child { border-radius: 0 16px 16px 0; }

        .rank-cell { font-weight: 800; font-size: 1.1rem; width: 60px; text-align: center; }
        .rank-1 { color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }

        .user-id { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #fff; font-size: 0.9rem; }
        .points-val { font-weight: 800; color: var(--primary); }
        
        .stat-tag { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

        .back-btn {
            position: fixed; top: 30px; left: 30px;
            padding: 12px 20px; border-radius: 16px;
            background: var(--card-bg); border: 1px solid var(--card-border);
            color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 700;
            backdrop-filter: blur(12px); transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(-5px); }

        .watermark { position: fixed; bottom: 20px; right: 20px; opacity: 0.3; font-size: 0.7rem; font-family: monospace; pointer-events: none; }

    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="liquid-container">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
    </div>
</div>

<a href="/" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    DASHBOARD
</a>

<div class="container">
    <header>
        <h1>Hall of Fame</h1>
        <p class="subtitle">Top Stair Climbers</p>
    </header>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th style="text-align: center;">Rank</th>
                    <th>User</th>
                    <th>Exp</th>
                    <th>Stats</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Data injected here -->
            </tbody>
        </table>
    </div>
</div>

<div class="watermark">STAIR-STEP ELITE | DESIGNED BY PRANAV BISHT</div>

<script>
    async function loadLeaderboard() {
        try {
            const res = await fetch('/leaderboard');
            const data = await res.json();
            const body = document.getElementById('leaderboard-body');
            
            body.innerHTML = data.map((user, idx) => {
                const rank = idx + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                const displayName = user.regNo;

                return `
                    <tr>
                        <td class="rank-cell ${rankClass}">#${rank}</td>
                        <td>
                            <div class="user-id">${displayName}</div>
                        </td>
                        <td>
                            <div class="points-val">${user.points}</div>
                        </td>
                        <td>
                            <div style="display: flex; flex-direction: column; gap: 4px;">
                                <div class="stat-tag">🔥 ${user.streak}d Streak</div>
                                <div class="stat-tag">🏅 ${user.badges} Badges</div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--text-muted);">No explorers found yet.</td></tr>';
        } catch (err) {
            console.error("LEADERBOARD_ERR:", err);
        }
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 10000); // Refresh every 10s
</script>

</body>
</html>
