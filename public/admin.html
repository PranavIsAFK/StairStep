
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StairStep Admin | Elite Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
        }

        .container { width: 100%; max-width: 1000px; padding: 40px 20px; z-index: 10; }

        h1 {
            font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 2.5rem; text-align: center;
        }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 2.5rem; }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px); border: 1px solid var(--card-border);
            border-radius: 24px; padding: 24px; text-align: center;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 32px; padding: 32px; margin-bottom: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
        h2::before { content: ""; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 16px; border-bottom: 1px solid var(--card-border); }
        th { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        td { font-size: 0.9rem; }

        .rank { font-weight: 800; color: var(--primary); }
        .tag { font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        input, textarea {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 12px; color: white; outline: none; transition: border 0.3s;
        }
        input:focus { border-color: var(--primary); }

        button {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .back-link { position: absolute; top: 40px; left: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: white; }

        .watermark { position: fixed; bottom: 24px; right: 24px; font-size: 0.75rem; color: var(--text-muted); opacity: 0.3; }

    </style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="container">
    <a href="/" class="back-link">← Exit Control</a>
    <h1>Admin Central</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-val" id="stat-users">0</div>
            <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-scans">0</div>
            <div class="stat-label">Total Scans</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-redeems">0</div>
            <div class="stat-label">Redemptions</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-streak">0</div>
            <div class="stat-label">Max Streak</div>
        </div>
    </div>

    <div class="card">
        <h2>Live Leaderboard</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>User Identity</th>
                        <th>EXP</th>
                        <th>Floor</th>
                        <th>Streak</th>
                        <th>Badges</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>Deploy New Reward</h2>
        <form id="offer-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Internal ID</label>
                    <input type="text" id="offer-id" placeholder="burger_01" required>
                </div>
                <div class="form-group">
                    <label>Point Cost</label>
                    <input type="number" id="offer-points" placeholder="100" required>
                </div>
            </div>
            <div class="form-group">
                <label>Offer Headline</label>
                <input type="text" id="offer-name" placeholder="Free Double Patty Burger" required>
            </div>
            <div class="form-group">
                <label>Offer Details</label>
                <textarea id="offer-desc" rows="3" placeholder="Valid at all campus cafeterias..." required></textarea>
            </div>
            <button type="submit">Activate Reward</button>
        </form>
    </div>
</div>

<div class="watermark">Elite Control System | Pranav Bisht</div>

<script>
    async function loadStats() {
        try {
            const res = await fetch('/admin/stats');
            const data = await res.json();
            document.getElementById('stat-users').innerText = data.totalUsers;
            document.getElementById('stat-scans').innerText = data.totalScansAllTime;
            document.getElementById('stat-redeems').innerText = data.totalRedemptions;
            document.getElementById('stat-streak').innerText = `${data.longestStreak}d`;
        } catch (err) { console.error(err); }
    }

    async function loadLeaderboard() {
        try {
            const res = await fetch('/leaderboard');
            const data = await res.json();
            const body = document.getElementById('leaderboard-body');
            body.innerHTML = data.map((user, idx) => `
                <tr>
                    <td class="rank">#${idx + 1}</td>
                    <td><span class="tag">${user.regNo}</span></td>
                    <td style="font-weight: 800; color: #fff;">${user.points}</td>
                    <td>Floor ${user.lastFloor || 0}</td>
                    <td>🔥 ${user.streak || 0}d</td>
                    <td>🏅 ${user.badges || 0}</td>
                </tr>
            `).join('') || '<tr><td colspan="6" style="text-align:center; padding: 40px;">No expeditions logged yet.</td></tr>';
        } catch (err) { console.error(err); }
    }

    document.getElementById('offer-form').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            id: document.getElementById('offer-id').value,
            name: document.getElementById('offer-name').value,
            points: document.getElementById('offer-points').value,
            desc: document.getElementById('offer-desc').value
        };

        try {
            const res = await fetch('/admin/add-reward', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.error) alert(result.error);
            else {
                alert("New perk deployed successfully!");
                e.target.reset();
            }
        } catch (err) { alert("Deployment failed."); }
    };

    function refresh() {
        loadStats();
        loadLeaderboard();
    }

    refresh();
    setInterval(refresh, 5000);
</script>

</body>
</html>
