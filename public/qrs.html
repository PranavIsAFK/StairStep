
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor QR Codes | StairStep Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #fff; padding: 40px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; }
        .qr-card { background: #1e293b; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .qr-card img { width: 100%; border-radius: 8px; border: 4px solid #fff; }
        .label { margin-top: 10px; font-weight: 700; font-size: 1.2rem; }
        .back-link { color: #818cf8; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Floor QR Library</h1>
    <p>Scan these to test the movement system.</p>
    
    <div class="grid" id="qr-grid">
        <!-- Will be filled by JS -->
    </div>

    <script>
        const grid = document.getElementById('qr-grid');
        for (let i = 0; i <= 15; i++) {
            const label = i === 0 ? "Ground Floor (0)" : `Floor ${i}`;
            const card = document.createElement('div');
            card.className = 'qr-card';
            card.innerHTML = `
                <img src="/qr_samples/floor_${i}.png" alt="${label}">
                <div class="label">${label}</div>
            `;
            grid.appendChild(card);
        }
    </script>


    <a href="/" class="back-link">← Back to App</a>
</body>
</html>
