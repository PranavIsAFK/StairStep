<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StairStep Elite | Academic Climbing Rewards</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Elegant Toned-Down Background */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #020617;
            overflow: hidden;
        }

        .liquid-container {
            position: absolute; width: 100%; height: 100%;
            filter: blur(100px);
        }

        .liquid-blob {
            position: absolute;
            width: 40vw; height: 40vw;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.3;
        }

        .blob-1 { background: var(--primary); top: -10%; left: -10%; animation: blob1 60s infinite linear; }
        .blob-2 { background: var(--secondary); bottom: -10%; right: -10%; animation: blob2 55s infinite linear; }
        .blob-3 { background: var(--accent); top: 50%; left: 50%; animation: blob3 50s infinite linear; }

        @keyframes blob1 { 0% { transform: translate(0, 0) scale(1.1); } 50% { transform: translate(15%, 10%) scale(1); } }
        @keyframes blob2 { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-10%, -15%) scale(1.1); } }
        @keyframes blob3 { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-40%, -60%) scale(1.2); } }

        .mouse-glow {
            position: fixed;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at var(--mx) var(--my), rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            z-index: 1000; pointer-events: none;
        }

        .particle {
            position: absolute; background: white; border-radius: 50%; opacity: 0.3;
            animation: float 20s infinite linear;
        }
        @keyframes float { 0% { transform: translateY(0); } 100% { transform: translateY(-100vh); } }

        /* HUD */
        .cyber-hud {
            position: fixed; font-family: 'JetBrains Mono', monospace; font-size: 10px;
            color: var(--primary); opacity: 0.4; pointer-events: none; z-index: 100;
        }
        .hud-tl { top: 20px; left: 20px; }
        .hud-br { bottom: 20px; right: 20px; text-align: right; }

        .container {
            width: 100%; max-width: 500px; padding: 40px 24px;
            position: relative; z-index: 10;
        }

        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.2em; }

        /* Card System */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .tilt-card { transform-style: preserve-3d; perspective: 2000px; }
        .tilt-inner { transition: transform 0.4s cubic-bezier(0.03, 0.98, 0.52, 0.99); transform: rotateX(var(--rx)) rotateY(var(--ry)); }
        .shine { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at var(--shx) var(--shy), rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none; }

        .points-box { text-align: center; padding: 10px 0; }
        .points-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2rem; }
        .points-val { font-size: 6rem; font-weight: 800; line-height: 1; margin: 10px 0; background: linear-gradient(135deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Rank Progress */
        .rank-container { margin-top: 2rem; }
        .rank-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .rank-title { font-size: 0.8rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
        .rank-name { font-size: 1.1rem; font-weight: 700; }
        .progress-track { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 1s; }

        /* Rewards Vouchers */
        .rewards-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 1.5rem; 
            min-height: 200px;
        }
        .reward-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            display: flex; flex-direction: column; gap: 12px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
            border-left: 4px solid var(--primary);
        }
        .reward-card::before, .reward-card::after {
            content: ""; position: absolute; left: -12px;
            width: 24px; height: 24px; background: var(--bg); border-radius: 50%; z-index: 2;
        }
        .reward-card::before { top: 15%; }
        .reward-card::after { bottom: 15%; }

        .reward-card:hover:not(.disabled) { transform: scale(1.03) rotateZ(1deg); background: rgba(255, 255, 255, 0.08); border-color: var(--primary); }
        .reward-card:active:not(.disabled) { transform: scale(0.98); }

        .reward-points { 
            font-size: 0.8rem; font-weight: 800; color: var(--primary); 
            background: rgba(99, 102, 241, 0.1); padding: 4px 10px; border-radius: 10px; 
            border: 1px dashed var(--primary); width: fit-content;
        }
        .voucher-divider { width: 100%; border-top: 2px dashed rgba(255,255,255,0.08); margin: 8px 0; }
        .reward-name { font-weight: 800; font-size: 1rem; }
        .reward-desc { font-size: 0.75rem; color: var(--text-muted); flex-grow: 1; }

        .redeem-btn {
            margin-top: auto; background: var(--primary); color: white;
            padding: 12px; border-radius: 14px; font-weight: 700; font-size: 0.8rem;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .redeem-btn:hover:not(:disabled) { background: #4f46e5; box-shadow: 0 0 15px var(--primary-glow); transform: scale(1.02); }
        .redeem-btn:disabled { cursor: not-allowed; opacity: 0.6; }

        /* Auth */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(40px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .auth-overlay.hidden { display: none; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; padding: 20px; }
        .auth-input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border);
            padding: 18px; border-radius: 20px; color: white; font-size: 1.1rem; margin-bottom: 2rem;
            text-align: center; outline: none; transition: border 0.3s;
        }
        .auth-input:focus { border-color: var(--primary); }
        .action-btn {
            width: 100%; background: var(--primary); color: white; padding: 18px; border-radius: 20px;
            font-weight: 700; font-size: 1.1rem; cursor: pointer; border: none;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4); transition: transform 0.3s;
        }
        .action-btn:hover { transform: translateY(-3px); }

        .logout-btn { color: var(--error); cursor: pointer; font-size: 0.8rem; font-weight: 600; opacity: 0.6; }
        .logout-btn:hover { opacity: 1; }

        /* Inventory Modal */
        .inventory-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.95); backdrop-filter: blur(40px);
            z-index: 4000; display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .inventory-overlay.show { opacity: 1; pointer-events: auto; }
        .inventory-overlay.show .inventory-card { transform: translateY(0); }

        .inventory-card {
            width: 100%; max-width: 500px;
            background: var(--card-bg); border-top: 1px solid var(--card-border);
            border-radius: 40px 40px 0 0; padding: 40px 24px;
            max-height: 85vh; overflow-y: auto;
            transform: translateY(100%); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .voucher-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 20px; margin-bottom: 16px;
            position: relative; overflow: hidden;
        }

        .voucher-code {
            font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; font-weight: 700;
            color: var(--primary); background: rgba(99, 102, 241, 0.1);
            padding: 8px; border-radius: 8px; text-align: center; letter-spacing: 2px; margin-top: 8px;
        }

        .close-inv {
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 0 auto 20px;
        }

        .inv-btn {
            position: fixed; top: 24px; left: 24px;
            width: 48px; height: 48px; background: var(--card-bg);
            backdrop-filter: blur(12px); border: 1px solid var(--card-border);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; transition: all 0.3s;
        }
        .magnetic-btn { display: inline-block; transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1); }

        .watermark { position: fixed; bottom: 20px; right: 20px; opacity: 0.3; font-size: 0.7rem; font-family: monospace; pointer-events: none; }

    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="liquid-container">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
        <div class="liquid-blob blob-3"></div>
    </div>
    <div class="mouse-glow"></div>
</div>

<div class="cyber-hud hud-tl">ARCH_STATUS::READY</div>
<div class="cyber-hud hud-br">STAIR_LOG::ACTIVE [COORD_X:<span id="hud-x">0</span>]</div>

<!-- Persistent Inventory Trigger -->
<div id="inv-trigger" class="inv-btn magnetic-btn" style="display: none;" onclick="toggleInventory(true)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
</div>

<div class="container">
    <header>
        <h1>StairStep</h1>
        <p class="subtitle">Peak Analytics Dashboard</p>
    </header>

    <!-- User Module -->
    <div id="main-content" style="display: none;">
        <div class="user-tag">
            <span id="current-user-tag" style="font-weight: 800; opacity: 0.8;">---</span>
            <span class="logout-btn" onclick="logout()">LOGOUT SESSION</span>
        </div>

        <div class="card tilt-card">
            <div class="tilt-inner">
                <div class="shine"></div>
                <div class="points-box">
                    <div class="points-label">Total Exp Accumulated</div>
                    <div id="points-val" class="points-val">0</div>
                </div>
                <div class="rank-container">
                    <div class="rank-header">
                        <div id="current-rank" class="rank-name">Stair Starter</div>
                    </div>
                    <div class="progress-track">
                        <div id="rank-bar" class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div id="reader" style="border-radius: 20px; overflow: hidden; background: #000;"></div>
        </div>

        <div class="card">
            <h3 style="font-size: 1rem; margin-bottom: 1rem; opacity: 0.7;">RECENT LOGS</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- Always Visible Reward Gallery -->
    <div class="grid-header">
        <span class="grid-title">Available Perks</span>
        <span id="sync-status" style="font-size: 0.7rem; color: var(--success); font-weight: 800; letter-spacing: 0.1em;">● SYNCED</span>
    </div>
    
    <div id="rewards-grid" class="rewards-grid">
        <!-- Vouchers Injected Here -->
    </div>

    <div class="quick-nav">
        <a href="/info.html">Help</a>
        <a href="/admin-profile.html">The Architect</a>
        <a href="/qrs.html">Dev Console</a>
    </div>
</div>

<div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
        <h1 style="font-size: 3rem; margin-bottom: 1rem;">ELITE_LOGIN</h1>
        <input type="text" id="reg-input" class="auth-input" placeholder="Enter Registration No.">
        <button onclick="login()" class="action-btn">ACCESS PIPELINE</button>
    </div>
</div>

<div id="toast" class="toast">Success!</div>
<div class="watermark">DESIGNED BY PRANAV BISHT</div>

<!-- Inventory UI Overlay -->
<div id="inventory-overlay" class="inventory-overlay" onclick="if(event.target === this) toggleInventory(false)">
    <div class="inventory-card">
        <div class="close-inv" onclick="toggleInventory(false)">✕</div>
        <h2 style="text-align: center; margin-bottom: 2rem;">Redeemed Portfolio</h2>
        <div id="inventory-list">
            <!-- Items injected here -->
        </div>
    </div>
</div>

<script>
    const DEFAULT_REWARDS = {
        'samosa': { name: "Free Samosa", points: 75, desc: "Claim at Campus Cafe with ₹99 orders" },
        'coffee': { name: "50% BrewPoint", points: 50, desc: "Half price on any hot beverage" },
        'gym': { name: "Gym Elite Access", points: 150, desc: "Full day pass to the fitness center" },
        'prints': { name: "10 Academic Prints", points: 25, desc: "Full color prints at Central Lab" },
        'meal': { name: "Student Meal Discount", points: 200, desc: "Flat ₹50 off at the main refectory" }
    };

    let cachedRewards = null;

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function login() {
        const regNo = document.getElementById('reg-input').value.trim();
        if(!regNo) return;
        localStorage.setItem('regNo', regNo);
        initApp();
    }

    function toggleInventory(show) {
        const overlay = document.getElementById('inventory-overlay');
        overlay.classList.toggle('show', show);
        if(show) fetchData(); // Sync on open
    }

    function logout() {
        localStorage.removeItem('regNo');
        location.reload();
    }

    async function fetchData() {
        const regNo = localStorage.getItem('regNo');
        const isLoggedIn = !!regNo;
        
        try {
            // Fetch User
            let user = { points: 0, history: [] };
            if (isLoggedIn) {
                const uRes = await fetch(`/data?regNo=${regNo}&t=${Date.now()}`);
                if (uRes.status === 412) return logout();
                user = await uRes.json();
            }

            // Fetch Rewards
            let rewards = cachedRewards;
            if(!rewards) {
                const rRes = await fetch(`/rewards?t=${Date.now()}`);
                rewards = await rRes.json();
                cachedRewards = rewards;
            }

            // Fallback if empty
            if(!rewards || Object.keys(rewards).length === 0) rewards = DEFAULT_REWARDS;

            renderUI(user, rewards, isLoggedIn);
        } catch (err) {
            console.error("DATA_ERR:", err);
            renderUI({points:0, history:[]}, DEFAULT_REWARDS, isLoggedIn);
        }
    }

    function renderUI(user, rewards, isLoggedIn) {
        if(isLoggedIn) {
            document.getElementById('points-val').innerText = user.points || 0;
            document.getElementById('current-user-tag').innerText = `USER::${localStorage.getItem('regNo')}`;
            updateRank(user.points || 0);
            
            const hList = document.getElementById('history-list');
            hList.innerHTML = user.history.length ? user.history.slice(0,5).map(i => `
                <div class="history-item">
                    <span class="hist-floor">${isNaN(i.floor) ? i.floor : 'Floor ' + i.floor}</span>
                    <span class="hist-time">${i.time}</span>
                </div>
            `).join('') : '<p style="text-align:center; opacity:0.3; padding:10px;">No expedition logs found.</p>';

            const iList = document.getElementById('inventory-list');
            if (user.inventory && user.inventory.length) {
                iList.innerHTML = user.inventory.map(item => `
                    <div class="voucher-card">
                        <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px;">
                            <span>${item.date}</span>
                            <span>-${item.points} EXP</span>
                        </div>
                        <div class="reward-name">${item.name}</div>
                        <div class="voucher-code">${item.voucherCode}</div>
                        <p style="font-size: 0.6rem; color: var(--text-muted); text-align: center; margin-top: 6px;">VALID ACADEMIC PASS</p>
                    </div>
                `).join('');
            } else {
                iList.innerHTML = '<p style="text-align:center; opacity:0.3; padding:2rem;">Inventory empty. Claim a perk!</p>';
            }
        }

        const grid = document.getElementById('rewards-grid');
        grid.innerHTML = Object.entries(rewards).map(([id, r]) => {
            const deficit = r.points - user.points;
            const canAfford = isLoggedIn && deficit <= 0;
            
            let btnText = isLoggedIn ? (canAfford ? 'CLAIM VOUCHER' : `NEED ${deficit} EXP`) : 'LOGIN TO CLAIM';
            let btnStyle = (!canAfford && isLoggedIn) ? 'background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error);' : '';

            return `
                <div class="reward-card ${!isLoggedIn || canAfford ? '' : 'disabled'}">
                    <div class="reward-points">${r.points} EXP</div>
                    <div class="reward-name">${r.name}</div>
                    <div class="voucher-divider"></div>
                    <div class="reward-desc">${r.desc}</div>
                    <button class="redeem-btn" style="${btnStyle}" 
                            onclick="${isLoggedIn ? (canAfford ? `redeem('${id}')` : '') : 'location.reload()'}">
                        ${btnText}
                    </button>
                </div>
            `;
        }).join('');
    }

    async function redeem(rewardId) {
        const regNo = localStorage.getItem('regNo');
        try {
            const res = await fetch('/redeem', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rewardId, regNo })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error);
            showToast("Success! Check your inventory.");
            fetchData();
        } catch(e) {
            showToast(e.message);
        }
    }

    function updateRank(pts) {
        let rank = "Stair Starter", percent = 0;
        if (pts < 50) { 
            percent = (pts / 50) * 100; 
        } else if (pts < 200) { 
            rank = "Climb Cadet"; 
            percent = ((pts - 50) / 150) * 100; 
        } else if (pts < 500) { 
            rank = "Peak Performer"; 
            percent = ((pts - 200) / 300) * 100; 
        } else { 
            rank = "Elite Mountaineer"; 
            percent = 100; 
        }
        document.getElementById('current-rank').innerText = rank;
        document.getElementById('rank-bar').style.width = percent + '%';
    }

    function initApp() {
        const regNo = localStorage.getItem('regNo');
        if(regNo) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('inv-trigger').style.display = 'flex'; // Show Gift
            startScanner();
        }
        fetchData();
        setInterval(fetchData, 10000); // Periodic sync
    }

    function startScanner() {
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            console.log("Stair_Scanned:", text);
            if (text.startsWith("FLOOR:")) {
                const floor = text.split(":")[1];
                if(floor !== undefined) {
                    fetch('/scan', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ floor: floor, regNo: localStorage.getItem('regNo') })
                    }).then(r => r.json()).then(res => {
                        if(res.error) showToast(res.error);
                        else { 
                            showToast(res.message); 
                            fetchData(); 
                        }
                    });
                }
            } else {
                showToast("Invalid QR Signature");
            }
        });
    }

    // Interaction UX
    document.addEventListener('mousemove', (e) => {
        const x = e.clientX, y = e.clientY;
        document.documentElement.style.setProperty('--mx', x + 'px');
        document.documentElement.style.setProperty('--my', y + 'px');
        document.getElementById('hud-x').innerText = x;

        document.querySelectorAll('.tilt-card').forEach(card => {
            const rect = card.getBoundingClientRect();
            const rx = -(y - rect.top - rect.height/2) / 40;
            const ry = (x - rect.left - rect.width/2) / 40;
            card.querySelector('.tilt-inner').style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
            card.style.setProperty('--shx', ((x - rect.left)/rect.width)*100 + '%');
            card.style.setProperty('--shy', ((y - rect.top)/rect.height)*100 + '%');
        });
    });

    initApp();
</script>
</body>
</html>
